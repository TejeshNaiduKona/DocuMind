name: Docker Image CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:

  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    
    - name: Build the standalone Docker image (Hugging Face Space)
      run: docker build . --file Dockerfile --tag documind-standalone:$(date +%s)
      
    - name: Build the backend Docker image
      run: docker build . --file Dockerfile.backend --tag documind-backend:$(date +%s)
      
    - name: Build the frontend Docker image
      run: docker build . --file Dockerfile.frontend --tag documind-frontend:$(date +%s)
